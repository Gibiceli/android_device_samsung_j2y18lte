name: Build crDroid ROM

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-20.04
steps:
- name: Checkout Device Tree
uses: actions/checkout@v3

  - name: Setup Build Environment
    run: |
      sudo apt-get update
      sudo apt-get install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z-dev libgl1-mesa-dev libxml2-utils xsltproc unzip python3
      mkdir -p ~/bin
      curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
      chmod a+x ~/bin/repo
      export PATH=~/bin:$PATH

  - name: Initialize Repo
    run: |
      mkdir build && cd build
      export PATH=~/bin:$PATH
      repo init -u https://github.com/crdroidandroid/android.git -b 11.0
      # Aquí deberás agregar tu local_manifest.xml en pasos futuros
  
  - name: Build ROM
    run: |
      cd build
      export PATH=~/bin:$PATH
      source build/envsetup.sh
      lunch crdroid_j2y18lte-userdebug
      mka bacon
