name: Build crDroid ROM

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-20.04
steps:
- name: Checkout Device Tree
uses: actions/checkout@v3

  - name: Setup Build Environment
    run: |
      sudo apt-get update
      sudo apt-get install -y git-core gnupg flex bison gperf build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z-dev libgl1-mesa-dev libxml2-utils xsltproc unzip python3
      mkdir -p ~/bin
      curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
      chmod a+x ~/bin/repo
      echo "$HOME/bin" >> $GITHUB_PATH

  # STREAMING_CHUNK: Setting up local manifest to auto-clone device and vendor trees...
  - name: Initialize Repo & Local Manifest
    run: |
      mkdir build && cd build
      repo init -u https://github.com/crdroidandroid/android.git -b 11.0
      
      # Crear directorio para manifiestos locales
      mkdir -p .repo/local_manifests
      
      # Escribir roomservice.xml de forma automatizada
      # NOTA: Reemplaza "TU_USUARIO_GITHUB" con tu nombre real de usuario de GitHub
      cat <<EOF > .repo/local_manifests/roomservice.xml
      <?xml version="1.0" encoding="UTF-8"?>
      <manifest>
        <!-- Árbol de Dispositivo (Device Tree) -->
        <project name="TU_USUARIO_GITHUB/android_device_samsung_j2y18lte" path="device/samsung/j2y18lte" remote="github" revision="11.0" />
        
        <!-- Árbol de Proveedor (Vendor Tree) -->
        <project name="TU_USUARIO_GITHUB/android_vendor_samsung_j2y18lte" path="vendor/samsung/j2y18lte" remote="github" revision="11.0" />
      </manifest>
      EOF

  # STREAMING_CHUNK: Syncing sources and compiling...
  - name: Sync Repositories
    run: |
      cd build
      repo sync -c --no-clone-bundle --no-tags --optimized-fetch --prune --force-sync -j$(nproc)

  - name: Build ROM
    run: |
      cd build
      source build/envsetup.sh
      lunch crdroid_j2y18lte-userdebug
      mka bacon
